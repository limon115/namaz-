name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Unzip project
        run: |
          mkdir -p project
          unzip -o "*.zip" -d project || echo "No zip archive found"


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      - name: Locate Android project root
        run: |
          ROOT=$(find project -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "ROOT=$ROOT" >> $GITHUB_ENV
          echo "Project root detected at: $ROOT"


      - name: Enable AndroidX
        run: |
          echo "android.useAndroidX=true" >> "$ROOT/gradle.properties"
          echo "android.enableJetifier=true" >> "$ROOT/gradle.properties"


      - name: Fix Gradle repository conflict
        run: |
          find "$ROOT" -name "settings.gradle" -exec sed -i 's/PREFER_SETTINGS/PREFER_PROJECT/g' {} +
          find "$ROOT" -name "settings.gradle.kts" -exec sed -i 's/PREFER_SETTINGS/PREFER_PROJECT/g' {} +


      - name: Prepare Gradle wrapper
        run: |
          cd "$ROOT"
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
          fi


      - name: Build Debug APK
        run: |
          cd "$ROOT"
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi


      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iftar-timer-debug-apk
          path: project/**/build/outputs/apk/debug/*.apk
