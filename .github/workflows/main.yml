name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Extract ZIP project
        run: |
          mkdir -p project
          shopt -s nullglob
          for f in *.zip; do
            unzip -o "$f" -d project
          done


      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH


      - name: Detect Android project root
        run: |
          ROOT=$(find project -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 | xargs dirname)
          echo "ROOT=$ROOT" >> $GITHUB_ENV
          echo "Detected project root: $ROOT"


      - name: Fix Gradle repository conflict
        run: |
          find project -name "settings.gradle*" -exec sed -i 's/PREFER_SETTINGS/PREFER_PROJECT/g' {} +
          find project -name "settings.gradle*" -exec sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' {} +


      - name: Fix gradle.properties safely
        run: |
          FILE="$ROOT/gradle.properties"
          touch "$FILE"
          echo "" >> "$FILE"

          sed -i 's/trueandroid.useAndroidX=true/true/g' "$FILE"

          grep -q "android.useAndroidX" "$FILE" || echo "android.useAndroidX=true" >> "$FILE"
          grep -q "android.enableJetifier" "$FILE" || echo "android.enableJetifier=true" >> "$FILE"


      - name: Create missing Android resources
        run: |
          RES="$ROOT/app/src/main/res"
          mkdir -p "$RES/mipmap-anydpi-v26"
          mkdir -p "$RES/values"

          if [ ! -f "$RES/mipmap-anydpi-v26/ic_launcher.xml" ]; then
            cat <<EOF > "$RES/mipmap-anydpi-v26/ic_launcher.xml"
<vector xmlns:android="http://schemas.android.com/apk/res/android"
    android:width="108dp"
    android:height="108dp"
    android:viewportWidth="108"
    android:viewportHeight="108">
    <path android:fillColor="#0F9D58" android:pathData="M0,0h108v108h-108z"/>
</vector>
EOF
          fi

          if [ ! -f "$RES/mipmap-anydpi-v26/ic_launcher_round.xml" ]; then
            cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"
          fi

          if [ ! -f "$RES/values/themes.xml" ]; then
            cat <<EOF > "$RES/values/themes.xml"
<resources>
    <style name="Theme.BDPrayer" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
        <item name="colorPrimary">#0F9D58</item>
        <item name="colorPrimaryVariant">#0B6E3C</item>
        <item name="colorOnPrimary">#FFFFFF</item>
    </style>
</resources>
EOF
          fi


      - name: Prepare Gradle wrapper
        run: |
          cd "$ROOT"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          fi


      - name: Build APK
        run: |
          cd "$ROOT"
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: |
            project/**/build/outputs/apk/debug/*.apk
